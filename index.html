<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<title>Sustainability</title>
<style>
:root{--bg:#121212;--card:#1E1E1E;--card2:#252525;--accent:#4FC3F7;--green:#66BB6A;--red:#EF5350;--yellow:#FFD54F;--text:#E0E0E0;--text2:#9E9E9E;--border:#333;--tab-bg:#1A1A1A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh;position:fixed;width:100%}
#app{height:calc(100vh - 56px);height:calc(100dvh - 56px);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 20px}
nav#tabbar{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--tab-bg);display:flex;border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);font-size:9px;gap:1px;border:none;background:none;cursor:pointer;transition:.2s;padding:0 2px}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:20px;height:20px;fill:currentColor}
h1{font-size:20px;font-weight:700;margin-bottom:12px;color:#fff}
h2{font-size:16px;font-weight:600;margin:16px 0 8px;color:var(--accent)}
h3{font-size:13px;font-weight:600;color:var(--text2);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;transition:.2s}
.card.done{border-left:3px solid var(--green)}.card.test{border-left:3px solid var(--yellow)}
.flex{display:flex;align-items:center}.between{justify-content:space-between}.gap8{gap:8px}.gap4{gap:4px}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pill-blue{background:rgba(79,195,247,.15);color:var(--accent)}.pill-green{background:rgba(102,187,106,.15);color:var(--green)}.pill-yellow{background:rgba(255,213,84,.15);color:var(--yellow)}.pill-red{background:rgba(239,83,80,.15);color:var(--red)}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--accent);color:#000}.btn-green{background:var(--green);color:#000}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;background:var(--card2);color:var(--text);cursor:pointer;font-size:16px}
.day-toggle{display:flex;gap:4px;margin-bottom:12px}
.day-toggle button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
.day-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.day-toggle button.completed{background:var(--green);color:#000;border-color:var(--green)}
.day-toggle button.completed.active{background:var(--green);border-color:var(--green);box-shadow:0 0 0 2px rgba(102,187,106,.4)}
.week-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.week-sel select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;flex:1;-webkit-appearance:none}
.ex-name{font-weight:600;font-size:14px;color:#fff}.ex-target{font-size:13px;color:var(--accent);margin-top:2px}.ex-actual{font-size:12px;color:var(--green);margin-top:2px}
.check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
.check.checked{background:var(--green);border-color:var(--green);color:#000}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}
.water-display{font-size:56px;font-weight:700;text-align:center;color:var(--accent);margin:8px 0}
.water-btns{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
canvas{width:100%!important;height:200px!important;border-radius:8px}
.meal-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.meal-item:last-child{border:none}
.meal-food{font-weight:500;font-size:13px}.meal-amount{color:var(--text2);font-size:12px;margin-top:2px}
.meal-macros{text-align:right;font-size:11px;color:var(--text2);white-space:nowrap}.meal-macros b{color:var(--accent)}
.grocery-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.grocery-item .check{width:24px;height:24px}
.grocery-item.checked-off .g-name{text-decoration:line-through;color:var(--text2)}
.g-name{font-size:13px;font-weight:500}.g-qty{font-size:12px;color:var(--text2)}
.stretch-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stretch-info{flex:1}.stretch-name{font-weight:600;font-size:14px}.stretch-dur{color:var(--accent);font-size:12px}
.stretch-desc{color:var(--text2);font-size:12px;margin-top:4px}
.timer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200}
.timer-overlay.show{display:flex}
.timer-time{font-size:72px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.timer-label{font-size:16px;color:var(--text2);margin-bottom:20px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;z-index:150}
.modal.show{display:flex}
.modal-content{background:var(--card);width:100%;border-radius:16px 16px 0 0;padding:20px;max-height:80vh;overflow-y:auto}
.input{width:100%;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:8px}
.input:focus{outline:none;border-color:var(--accent)}
.input-sm{padding:8px;font-size:13px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);width:100%;text-align:center}
.input-sm:focus{outline:none;border-color:var(--accent)}
.sub-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto}
.sub-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.sub-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.template-ex{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.stat-num{font-size:36px;font-weight:700;color:var(--accent);text-align:center}
.stat-label{font-size:12px;color:var(--text2);text-align:center}
select.chart-select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;width:100%;margin-bottom:12px;-webkit-appearance:none}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.set-row .set-num{color:var(--text2);font-size:12px;font-weight:600;min-width:28px}
.set-row .del-set{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:none;color:var(--red);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.sets-logged{font-size:11px;color:var(--green);margin-top:3px;line-height:1.4}
.session-timer{background:var(--card2);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--accent);font-variant-numeric:tabular-nums;text-align:center;margin-bottom:12px}
.backup-banner{background:rgba(255,213,84,.15);border:1px solid rgba(255,213,84,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.backup-banner .bb-text{font-size:12px;color:#FFD54F}.backup-banner .bb-btn{white-space:nowrap}
</style>
</head>

function td(){return new Date().toISOString().slice(0,10)}
function dBet(a,b){return Math.floor((new Date(b)-new Date(a))/864e5)}
function getT(ex,d,w){const i=w-1;if(ex==='Pull-ups'&&d==='A')return P['Pull-ups_A'][i]||'';if(ex==='Pull-ups'&&d==='B')return P['Pull-ups_B'][i]||'';return P[ex]?P[ex][i]||'':''}
function wK(w,d){return`w${w}_${d}`}
function wG(w,d){return S.get(wK(w,d),{})}
function wS(w,d,data){S.set(wK(w,d),data)}
function pW(s){const m=s.match(/@(\d+)/);return m?+m[1]:0}
function pR(s){const m=s.match(/×(\d+)/);return m?+m[1]:0}
function pSets(s){const m=s.match(/^(\d+)×/);return m?+m[1]:0}

// Parse target into set objects
function targetToSets(target){
  const sets=pSets(target),reps=pR(target),wt=pW(target);
  const arr=[];for(let i=0;i<(sets||1);i++)arr.push({wt:wt,reps:reps||0});
  return arr;
}

// Format sets array for display
function fmtSets(sets){
  if(!sets||!sets.length)return'';
  return sets.map((s,i)=>`${s.wt?s.wt+'×':''}${s.reps}`).join(' · ');
}

// Get exercise history with volume
function getHist(exName){
  const pts=[];
  for(let w=1;w<=28;w++){
    for(const d of['A','B','C']){
      if(!DAYS[d].ex.includes(exName))continue;
      const data=wG(w,d),rec=data[exName];if(!rec||!rec.done)continue;
      let maxWt=0,maxReps=0,vol=0;
      if(rec.sets&&rec.sets.length){
        rec.sets.forEach(s=>{if(s.wt>maxWt)maxWt=s.wt;if(s.reps>maxReps)maxReps=s.reps;vol+=((s.wt||1)*s.reps)});
      } else {
        const src=rec.actual||getT(exName,d,w);maxWt=pW(src);maxReps=pR(src);vol=pSets(src)*maxReps*(maxWt||1);
      }
      pts.push({week:w,day:d,weight:maxWt,reps:maxReps,vol,date:rec.date||'',label:`W${w}`});
    }
  }
  return pts;
}

function drawBar(id,labels,vals,color,mx){
  setTimeout(()=>{const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d');const W=c.parentElement.clientWidth;c.width=W*2;c.height=400;ctx.scale(2,2);const w=W,h=200,pad=35,bp=30;ctx.clearRect(0,0,w,h);const M=mx||Math.max(...vals,1);const bw=Math.max(4,Math.min(28,(w-pad*2)/labels.length-2));ctx.fillStyle='#333';ctx.fillRect(pad,0,1,h-bp);ctx.fillRect(pad,h-bp,w-pad,1);ctx.font='10px -apple-system,sans-serif';ctx.fillStyle='#9E9E9E';for(let i=0;i<=4;i++){const y=(h-bp)*(1-i/4);ctx.fillText(Math.round(M*i/4),2,y+4)}const step=(w-pad*2)/labels.length;vals.forEach((v,i)=>{const bh=Math.max(1,(v/M)*(h-bp-10));const x=pad+step*i+(step-bw)/2;ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,h-bp-bh,bw,bh,2);ctx.fill();if(v>0){ctx.save();ctx.fillStyle='#fff';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(v,x+bw/2,h-bp-bh-4);ctx.restore()}if(labels.length<=14){ctx.save();ctx.fillStyle='#9E9E9E';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(labels[i],x+bw/2,h-bp+12);ctx.restore()}})},50)}

function drawLine(id,pts,yKey,color,unit){
  setTimeout(()=>{const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d');const W=c.parentElement.clientWidth;c.width=W*2;c.height=400;ctx.scale(2,2);const w=W,h=200,pad=40,bp=30;ctx.clearRect(0,0,w,h);
  if(!pts.length){ctx.fillStyle='#9E9E9E';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('Complete workouts to see data',w/2,h/2);return}
  const vals=pts.map(p=>p[yKey]);const mx=Math.max(...vals)*1.15||1;const mn=Math.min(...vals)*0.85||0;const rng=mx-mn||1;
  ctx.fillStyle='#333';ctx.fillRect(pad,0,1,h-bp);ctx.fillRect(pad,h-bp,w-pad,1);
  ctx.font='10px sans-serif';ctx.fillStyle='#9E9E9E';for(let i=0;i<=4;i++){const y=(h-bp)*(1-i/4);ctx.fillText(Math.round(mn+rng*i/4)+(unit||''),1,y+4)}
  const step=(w-pad*2)/Math.max(pts.length-1,1);ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
  pts.forEach((p,i)=>{const x=pad+step*i;const y=(h-bp)*(1-(p[yKey]-mn)/rng);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
  ctx.fillStyle=color;pts.forEach((p,i)=>{const x=pad+step*i;const y=(h-bp)*(1-(p[yKey]-mn)/rng);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.save();ctx.fillStyle='#fff';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(Math.round(p[yKey]),x,y-8);ctx.restore()});
  if(pts.length<=20){ctx.fillStyle='#9E9E9E';ctx.font='9px sans-serif';ctx.textAlign='center';pts.forEach((p,i)=>{ctx.fillText(p.label,pad+step*i,h-bp+12)})}},50)}

  STRETCHES.forEach((s,i)=>{h+=`<div class="stretch-item"><div class="check ${chk[i]?'checked':''}" onclick="togStr(${i})">${chk[i]?'✓':''}</div><div class="stretch-info" onclick="startTmr(${s.sec},'${s.name}')"><div class="flex between"><div class="stretch-name">${s.name}</div><span class="pill pill-blue" style="font-size:11px">${s.dur}</span></div><div class="stretch-desc">${s.desc}</div></div></div>`});
  h+=`<div style="text-align:center;margin-top:12px">${allD?'<span class="pill pill-green" style="padding:8px 20px">✓ Done today!</span>':''}</div>`;el.innerHTML=h;
}

function getHabitPeriodKey(hab,date){
  var d=new Date(date);
  if(hab.cadence==='daily')return date;
  if(hab.cadence==='weekly'){
    // Find Monday of this week
    var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);
    var mon=new Date(d);mon.setDate(diff);return mon.toISOString().slice(0,10);
  }
  if(hab.cadence==='monthly')return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
  if(hab.cadence==='quarterly'){var q=Math.floor(d.getMonth()/3)+1;return d.getFullYear()+'-Q'+q}
  return date;
}

function isHabitDone(hab){
  var key=getHabitPeriodKey(hab,td());
  var log=S.get('hab_'+hab.id,{});
  return !!log[key];
}

function toggleHabit(i){
  var habits=S.get('habits',[]);var hab=habits[i];if(!hab)return;
  var key=getHabitPeriodKey(hab,td());
  var log=S.get('hab_'+hab.id,{});
  log[key]=!log[key];
  S.set('hab_'+hab.id,log);
  render();
}

function getHabitCompliance(hab){
  var log=S.get('hab_'+hab.id,{});
  var created=hab.created||S.get('launchDate',td());
  var periods=getPeriodsFromDate(hab.cadence,created);
  if(!periods.length)return 0;
  var done=0;periods.forEach(function(p){if(log[p])done++});
  return Math.round(done/periods.length*100);
}

function getPeriodsFromDate(cadence,startDate){
  var periods=[];var now=new Date();var d=new Date(startDate);
  if(cadence==='daily'){
    while(d<=now){periods.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1)}
  } else if(cadence==='weekly'){
    var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);
    while(d<=now){periods.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+7)}
  } else if(cadence==='monthly'){
    d.setDate(1);
    while(d<=now){periods.push(d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1));d.setMonth(d.getMonth()+1)}
  } else if(cadence==='quarterly'){
    d.setDate(1);d.setMonth(Math.floor(d.getMonth()/3)*3);
    while(d<=now){var q=Math.floor(d.getMonth()/3)+1;periods.push(d.getFullYear()+'-Q'+q);d.setMonth(d.getMonth()+3)}
  }
  return periods;
}

function getHabitChartData(hab){
  var log=S.get('hab_'+hab.id,{});
  var created=hab.created||S.get('launchDate',td());
  var labels=[],values=[];

  if(hab.cadence==='daily'){
    // Show rolling weekly compliance for daily habits
    var start=new Date(created);var now=new Date();
    var weekNum=0;
    while(start<=now){
      var weekDone=0,weekTotal=0;
      for(var wd=0;wd<7&&start<=now;wd++){
        var ds=start.toISOString().slice(0,10);weekTotal++;if(log[ds])weekDone++;
        start.setDate(start.getDate()+1);
      }
      weekNum++;if(weekTotal>0){labels.push('Wk'+weekNum);values.push(Math.round(weekDone/weekTotal*100))}
    }
  } else {
    var periods=getPeriodsFromDate(hab.cadence,created);
    periods.forEach(function(p,pi){
      var label=hab.cadence==='weekly'?'Wk'+(pi+1):hab.cadence==='monthly'?p.slice(2):p;
      labels.push(label);values.push(log[p]?100:0);
    });
  }
  return{labels:labels,values:values};
}

function addHabit(){

// ============ PR DETECTION & CONFETTI ============
function getAllPRs(){
  var prs={};
  ALL_EX.forEach(function(ex){
    var hist=getHist(ex);var bestWt=0,bestReps=0,bestVol=0;
    hist.forEach(function(h){if(h.weight>bestWt)bestWt=h.weight;if(h.reps>bestReps)bestReps=h.reps;if(h.vol>bestVol)bestVol=h.vol});
    if(hist.length)prs[ex]={weight:bestWt,reps:bestReps,vol:bestVol,sessions:hist.length};
  });
  return prs;
}
function checkForPR(ex,rec){
  if(!rec.sets||!rec.sets.length)return;
  var oldPrs=S.get('prs',{});var isW=WEIGHTED.has(ex);
  var best=0;rec.sets.forEach(function(s){var v=isW?s.wt:s.reps;if(v>best)best=v});
  var prev=oldPrs[ex]||0;
  if(best>prev){oldPrs[ex]=best;S.set('prs',oldPrs);fireConfetti()}
}
function fireConfetti(){
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300';
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  var particles=[];var colors=['#4FC3F7','#66BB6A','#FFD54F','#EF5350','#AB47BC','#fff'];
  for(var i=0;i<120;i++)particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*12,vy:Math.random()*-14-4,size:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,life:1});
  var frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);var alive=false;
    particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.rot+=3;p.life-=0.012;if(p.life<=0)return;alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()});
    if(alive&&frame<180){frame++;requestAnimationFrame(animate)}else{document.body.removeChild(canvas)}
  }
  requestAnimationFrame(animate);
}

// ============ WEEKLY RECAP ============
function getWeekRecap(){
  var workouts=0,totalVol=0,waterTotal=0,waterDays=0,stretchDays=0;
  for(var i=0;i<7;i++){
    var d2=new Date();d2.setDate(d2.getDate()-i);var ds=d2.toISOString().slice(0,10);
    var w=S.get('hyd_'+ds,0);if(w>0){waterTotal+=w;waterDays++}
    var sc=S.get('str_'+ds,[]);if(STRETCHES.every(function(_,j){return sc[j]}))stretchDays++;
  }
  for(var w2=1;w2<=28;w2++){
    ['A','B','C'].forEach(function(d){
      var wd=wG(w2,d);var allDone=DAYS[d].ex.every(function(ex){return wd[ex]&&wd[ex].done});
      if(allDone&&wd[DAYS[d].ex[0]]&&wd[DAYS[d].ex[0]].date){
        var dt=wd[DAYS[d].ex[0]].date;
        if(dBet(dt,td())<=7&&dBet(dt,td())>=0){
          workouts++;
          DAYS[d].ex.forEach(function(ex){if(wd[ex]&&wd[ex].sets)wd[ex].sets.forEach(function(s){totalVol+=(s.wt||1)*s.reps})});
        }
      }
    });
  }
  return{workouts:workouts,vol:totalVol,avgWater:waterDays?Math.round(waterTotal/waterDays):0,stretchDays:stretchDays};
}

function exportData(){
  var data={};Object.keys(localStorage).filter(function(k){return k.startsWith('bt_')}).forEach(function(k){data[k]=localStorage.getItem(k)});
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='brocks_training_backup_'+td()+'.json';a.click();URL.revokeObjectURL(url);
  S.set('lastExport',td());if(cTab==='workout')if(navigator.storage&&navigator.storage.persist){navigator.storage.persist().then(function(g){if(g)console.log('Persistent storage granted')})}
render();
}
function emailBackup(){
  var data={};Object.keys(localStorage).filter(function(k){return k.startsWith('bt_')}).forEach(function(k){data[k]=localStorage.getItem(k)});
  var json=JSON.stringify(data);
  var subject='Brock Training Backup - '+td();
  var body='Training app backup from '+td()+'%0A%0APaste into a .json file to restore:%0A%0A'+encodeURIComponent(json);
  if(body.length>1800000){body='Backup too large for email. Use Export button instead.'}
  window.location.href='mailto:brock.wiegand@rheoengineering.com?subject='+encodeURIComponent(subject)+'&body='+body;
  S.set('lastExport',td());
}
function backupNeeded(){var last=S.get('lastExport',null);if(!last)return true;return dBet(last,td())>=7}
function importData(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();reader.onload=function(e){
    try{var data=JSON.parse(e.target.result);var count=0;Object.keys(data).forEach(function(k){localStorage.setItem(k,data[k]);count++});
    alert('Imported '+count+' items. Reloading...');location.reload()}catch(err){alert('Invalid backup file')}};
  reader.readAsText(file);
}
