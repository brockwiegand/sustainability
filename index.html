<!DOCTYPE html>
<html lang="en">

<title>Sustainability</title>
<style>
:root{--bg:#121212;--card:#1E1E1E;--card2:#252525;--accent:#4FC3F7;--green:#66BB6A;--red:#EF5350;--yellow:#FFD54F;--purple:#AB47BC;--text:#E0E0E0;--text2:#9E9E9E;--border:#333;--tab-bg:#1A1A1A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh;position:fixed;width:100%}
#app{height:calc(100vh - 52px);height:calc(100dvh - 52px - env(safe-area-inset-top));margin-top:calc(52px + env(safe-area-inset-top));overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 24px}
nav#tabbar{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--tab-bg);display:flex;border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);font-size:9px;gap:1px;border:none;background:none;cursor:pointer;transition:.2s;padding:0 2px}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:20px;height:20px;fill:currentColor}
.tab-badge{position:absolute;top:5px;left:50%;margin-left:6px;min-width:15px;height:15px;background:var(--red);color:#fff;border-radius:8px;font-size:9px;font-weight:700;line-height:15px;text-align:center;display:none;padding:0 3px}
.tab-badge.show{display:block}
h1{font-size:20px;font-weight:700;margin-bottom:12px;color:#fff}
h2{font-size:16px;font-weight:600;margin:16px 0 8px;color:var(--accent)}
h3{font-size:13px;font-weight:600;color:var(--text2);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;transition:.2s}
.card.done{border-left:3px solid var(--green)}.card.test{border-left:3px solid var(--yellow)}
.flex{display:flex;align-items:center}.between{justify-content:space-between}.gap8{gap:8px}.gap4{gap:4px}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pill-blue{background:rgba(79,195,247,.15);color:var(--accent)}.pill-green{background:rgba(102,187,106,.15);color:var(--green)}.pill-yellow{background:rgba(255,213,84,.15);color:var(--yellow)}.pill-red{background:rgba(239,83,80,.15);color:var(--red)}.pill-purple{background:rgba(171,71,188,.15);color:var(--purple)}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--accent);color:#000}.btn-green{background:var(--green);color:#000}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;background:var(--card2);color:var(--text);cursor:pointer;font-size:16px}
.day-toggle{display:flex;gap:4px;margin-bottom:12px}
.day-toggle button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
.day-toggle button.active{background:var(--accent);color:#000;border-color:var(--accent)}
.day-toggle button.completed{background:var(--green);color:#000;border-color:var(--green)}
.day-toggle button.completed.active{background:var(--green);border-color:var(--green);box-shadow:0 0 0 2px rgba(102,187,106,.4)}
.week-sel{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.week-sel select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;flex:1;-webkit-appearance:none}
.ex-name{font-weight:600;font-size:14px;color:#fff}.ex-target{font-size:13px;color:var(--accent);margin-top:2px}.ex-actual{font-size:12px;color:var(--green);margin-top:2px}
.ex-cat{font-size:11px;color:var(--text2);margin-top:2px}
.check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;flex-shrink:0}
.check.checked{background:var(--green);border-color:var(--green);color:#000}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}
.water-display{font-size:56px;font-weight:700;text-align:center;color:var(--accent);margin:8px 0}
.water-btns{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
canvas{width:100%!important;height:200px!important;border-radius:8px}
.meal-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.meal-item:last-child{border:none}
.meal-food{font-weight:500;font-size:13px}.meal-amount{color:var(--text2);font-size:12px;margin-top:2px}
.meal-macros{text-align:right;font-size:11px;color:var(--text2);white-space:nowrap}.meal-macros b{color:var(--accent)}
.grocery-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.grocery-item .check{width:24px;height:24px}
.grocery-item.checked-off .g-name{text-decoration:line-through;color:var(--text2)}
.g-name{font-size:13px;font-weight:500}.g-qty{font-size:12px;color:var(--text2)}
.stretch-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stretch-info{flex:1}.stretch-name{font-weight:600;font-size:14px}.stretch-dur{color:var(--accent);font-size:12px}
.stretch-desc{color:var(--text2);font-size:12px;margin-top:4px}
.timer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200}
.timer-overlay.show{display:flex}
.timer-time{font-size:72px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.timer-label{font-size:16px;color:var(--text2);margin-bottom:20px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:flex-end;z-index:150}
.modal.show{display:flex}
.modal-content{background:var(--card);width:100%;border-radius:16px 16px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal-content p{font-size:13px;line-height:1.5;margin-bottom:6px}
.input{width:100%;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:8px;font-family:inherit}
.input:focus{outline:none;border-color:var(--accent)}

.input-sm{padding:8px;font-size:13px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);width:100%;text-align:center}
.input-sm:focus{outline:none;border-color:var(--accent)}

.template-ex{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.stat-num{font-size:36px;font-weight:700;color:var(--accent);text-align:center}
.stat-label{font-size:12px;color:var(--text2);text-align:center}

.sets-logged{font-size:11px;color:var(--green);margin-top:3px;line-height:1.4}

#topbar{position:fixed;top:0;left:0;right:0;height:calc(52px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 14px 0 14px;background:var(--tab-bg);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);z-index:120}

.hb-dot{position:absolute;top:6px;right:3px;width:9px;height:9px;border-radius:50%;background:var(--red);display:none}
.hb-dot.show{display:block}

</head>

const GLOSSARY={
  "Back Squat":{m:"Quads, Glutes, Hamstrings, Core",e:"Barbell, Squat Rack",h:"1) Set bar on upper traps, grip wide. 2) Unrack, feet shoulder-width, toes slightly out. 3) Brace core, push hips back. 4) Squat until thighs are parallel or just below. 5) Drive through heels to stand.",t:"Keep chest up and knees tracking over toes. Don't let knees cave inward. Brace your core like someone is about to punch you. Go only as deep as you can with good form."},
  "Pull-ups":{m:"Lats, Biceps, Rear Delts, Core",e:"Pull-up Bar",h:"1) Grip bar overhand, slightly wider than shoulders. 2) Hang with arms fully extended. 3) Pull up by driving elbows down and back. 4) Get chin over bar. 5) Lower with control.",t:"Avoid swinging or kipping. Initiate the pull by squeezing your shoulder blades down. If you can't get enough reps, use a band for assistance. Full extension at the bottom each rep."},
  "T-bar Row":{m:"Mid-Back, Lats, Rhomboids, Biceps",e:"T-bar Row Machine or Landmine",h:"1) Straddle the bar or stand on the platform. 2) Grip the handles, hinge at hips ~45°. 3) Pull the weight toward your chest/upper stomach. 4) Squeeze shoulder blades at top. 5) Lower with control.",t:"Keep your back flat — don't round it. Pull to your chest, not your belly. Let the weight stretch your lats at the bottom. Adjust foot position for comfort."},
  "DB Lunges":{m:"Quads, Glutes, Hamstrings, Core",e:"Dumbbells",h:"1) Hold a dumbbell in each hand at your sides. 2) Step forward with one leg. 3) Lower until both knees are ~90°. 4) Push through front heel to return to start. 5) Alternate legs.",t:"Keep your torso upright. Front knee should stay over your ankle, not past your toes. Take a long enough step so your shin stays vertical. Start with lighter weight to nail balance."},
  "Calf Raises":{m:"Gastrocnemius, Soleus",e:"Calf Raise Machine",h:"1) Position shoulders under pads, balls of feet on platform edge. 2) Stand up to unrack. 3) Lower heels below the platform slowly (full stretch). 4) Push up onto your toes as high as possible. 5) Pause at top, then lower slowly.",t:"Use full range of motion — stretch at the bottom, squeeze at the top. Go slow: 2 sec up, 2 sec down. Avoid bouncing. Calves respond well to higher reps (12-15+)."},
  "Ab Wheel":{m:"Rectus Abdominis, Obliques, Shoulders",e:"Ab Wheel",h:"1) Kneel on the floor, grip the ab wheel with both hands. 2) Brace your core tight. 3) Roll forward slowly, extending arms and hips. 4) Go as far as you can while keeping a flat back. 5) Pull back to start using your abs.",t:"Don't let your lower back sag — keep core braced throughout. Start with short rollouts and increase range over time. Standing rollouts are the advanced version. Squeeze your glutes to protect your lower back."},
  "Bench Press":{m:"Chest, Front Delts, Triceps",e:"Barbell, Flat Bench, Rack",h:"1) Lie back, eyes under the bar. Grip just outside shoulder width. 2) Arch slightly, plant feet flat. 3) Unrack, lower bar to mid-chest with control. 4) Touch chest lightly, then press up and slightly back. 5) Lock out arms at top.",t:"Squeeze shoulder blades together and keep them pinched throughout. Don't bounce the bar off your chest. Keep wrists straight. Breathe in on the way down, brace, then exhale pushing up. Use a spotter for heavy sets."},
  "Barbell Row":{m:"Mid-Back, Lats, Rhomboids, Biceps",e:"Barbell",h:"1) Stand with feet hip-width, hinge at hips ~45°. 2) Grip bar just outside knees, overhand. 3) Pull bar to your lower chest/upper stomach. 4) Squeeze shoulder blades at top. 5) Lower with control.",t:"Keep your back flat — imagine balancing a glass of water on it. Don't jerk the weight up with momentum. Pull with your elbows, not your hands. A slight body English on heavy sets is OK, but don't make it a habit."},
  "DB Chest Flys":{m:"Chest (inner/outer), Front Delts",e:"Dumbbells, Flat Bench",h:"1) Lie on flat bench, DBs pressed above chest. 2) Slight bend in elbows (keep this angle locked). 3) Open arms wide, lowering DBs in an arc until you feel a stretch. 4) Squeeze chest to bring DBs back together overhead.",t:"Think of hugging a large tree — the arc motion, not a press. Don't go too deep; stop when you feel a good stretch. Keep a slight elbow bend to protect your shoulders. Use lighter weight than you think."},
  "Triceps Press":{m:"Triceps (all 3 heads)",e:"Cable Machine + Rope/Bar",h:"1) Attach rope or straight bar to high cable. 2) Grip with palms down, elbows pinned to sides. 3) Push down until arms are fully extended. 4) Squeeze triceps at the bottom. 5) Let the bar come up slowly to ~90° elbow bend.",t:"Keep your elbows glued to your sides — don't let them flare. Stand with slight forward lean for stability. Don't use momentum from your body. If using rope, spread the ends apart at the bottom for extra squeeze."},
  "Russian Twists":{m:"Obliques, Rectus Abdominis, Hip Flexors",e:"Plate or Dumbbell",h:"1) Sit on floor, knees bent, feet flat (or elevated for harder). 2) Lean back ~45°, hold weight at chest. 3) Rotate torso to touch weight to one side. 4) Rotate to opposite side. That's 1 rep (each side = 1).",t:"Rotate from your ribcage, not just your arms. Keep your chest up — don't round forward. Feet can stay on ground for stability or lift them for more challenge. Go slow and controlled, not fast."},
  "Deadlift":{m:"Hamstrings, Glutes, Lower Back, Traps, Core",e:"Barbell",h:"1) Stand with feet hip-width, bar over mid-foot. 2) Hinge and grip bar just outside legs. 3) Drop hips until shins touch bar, chest up, back flat. 4) Drive through feet, push the floor away. 5) Stand tall, squeeze glutes at top. Lower by hinging hips back.",t:"The bar should stay in contact with your legs the entire lift. Don't round your lower back — keep it flat or slightly arched. Think 'push the floor away' rather than 'pull the bar up.' Reset between reps for good form."},
  "Overhead Press":{m:"Front/Side Delts, Triceps, Upper Chest, Core",e:"Barbell, Rack",h:"1) Unrack bar at collarbone height, grip just outside shoulders. 2) Brace core, squeeze glutes. 3) Press bar straight up, moving your head back slightly to clear. 4) Lock out overhead, bar over mid-foot. 5) Lower to collarbone with control.",t:"Don't lean back excessively — that turns it into an incline press. Squeeze your glutes and brace your abs to protect your spine. Think about pushing your head 'through the window' as the bar passes your face. Full lockout at the top."},
  "Lat Pulldown":{m:"Lats, Biceps, Rear Delts, Rhomboids",e:"Lat Pulldown Machine",h:"1) Grip the bar wide (1.5× shoulder width). 2) Sit with thighs under pads. 3) Lean back slightly (~15°). 4) Pull bar down to upper chest by driving elbows down and back. 5) Squeeze lats, then extend arms fully.",t:"Don't pull behind your neck — always to the front/upper chest. Initiate the pull with your lats, not your biceps (think 'elbows to pockets'). Full extension at top for a good stretch. Control the weight up — no slamming."},
  "DB Lat Raises":{m:"Side Delts (Medial Head)",e:"Dumbbells",h:"1) Stand tall, DB in each hand at your sides. 2) Slight bend in elbows. 3) Raise arms out to the sides until parallel with floor. 4) Pause briefly at the top. 5) Lower slowly.",t:"Lead with your elbows, not your hands — imagine pouring water from a pitcher. Don't swing or use momentum. These are meant to be light and controlled. Keep a slight forward lean to better target the side delt. Pinky side up slightly at the top."},
  "Face Pulls":{m:"Rear Delts, Rhomboids, Rotator Cuff",e:"Cable Machine + Rope",h:"1) Set cable to face height. Attach rope. 2) Grip rope with thumbs toward you. 3) Pull toward your face, splitting the rope apart. 4) End position: hands beside ears, elbows high and back. 5) Squeeze rear delts, then return slowly.",t:"Keep elbows HIGH — at or above shoulder level. Think about pulling the rope apart, not just toward you. This is a shoulder health exercise — use lighter weight and focus on the squeeze. Great to superset with pressing movements."},
  "Hanging Leg Raise":{m:"Lower Abs, Hip Flexors, Obliques",e:"Pull-up Bar or Captain's Chair",h:"1) Hang from a pull-up bar with straight arms. 2) Brace core. 3) Raise legs until thighs are at least parallel to floor. 4) Pause at the top. 5) Lower with control — don't just drop them.",t:"Avoid swinging. If you swing, you're using momentum instead of abs. Bend knees slightly if straight legs are too hard. For toes-to-bar: curl your pelvis up at the top. Engage your lats to stay stable."}

{name:"Incline Barbell Bench Press",cat:"Chest",type:"weight",metrics:[],target:"4×8",notes:{m:"Upper Chest, Front Delts, Triceps",e:"Barbell, Incline Bench, Rack",h:"1) Set the bench to 30-45°. 2) Grip just outside shoulder width and unrack. 3) Lower the bar to your upper chest. 4) Press up and slightly back to lockout.",t:"Keep your shoulder blades retracted and don't flare the elbows excessively. A steeper bench shifts work to the front delts. Plant your feet and drive through them."}},
{name:"Incline Dumbbell Press",cat:"Chest",type:"weight",metrics:[],target:"3×10",notes:{m:"Upper Chest, Front Delts, Triceps",e:"Dumbbells, Incline Bench",h:"1) Set the bench to 30-45°, dumbbells at your shoulders. 2) Press up until arms nearly lock. 3) Lower with control to chest level. 4) Keep a slight arc.",t:"Dumbbells allow a deeper stretch than the barbell. Don't clank the bells together at the top. Control the descent for 2-3 seconds."}},
{name:"Flat Dumbbell Press",cat:"Chest",type:"weight",metrics:[],target:"3×10",notes:{m:"Chest, Front Delts, Triceps",e:"Dumbbells, Flat Bench",h:"1) Lie back with dumbbells at your chest, feet flat. 2) Press up over the chest. 3) Lower until elbows are about level with the bench. 4) Press back up.",t:"Greater range of motion than a barbell. Keep your wrists stacked over your elbows. Use a controlled tempo and don't bounce at the bottom."}},
{name:"Machine Chest Press",cat:"Chest",type:"weight",metrics:[],target:"3×12",notes:{m:"Chest, Front Delts, Triceps",e:"Chest Press Machine",h:"1) Set the seat so handles sit at mid-chest. 2) Grip the handles and press forward to near lockout. 3) Return slowly until you feel a chest stretch.",t:"Great for safely pushing close to failure without a spotter. Keep shoulders down and back against the pad. Don't let the stack slam."}},
{name:"Pec Deck (Machine Fly)",cat:"Chest",type:"weight",metrics:[],target:"3×12",notes:{m:"Chest (inner), Front Delts",e:"Pec Deck Machine",h:"1) Set the seat so the handles are at chest height. 2) Press the pads together in a hugging arc. 3) Squeeze in the middle. 4) Return slowly to a stretch.",t:"Lead with your elbows, not your hands. Pause and squeeze in the contracted position. Keep your back flat against the pad."}},
{name:"Cable Crossover",cat:"Chest",type:"weight",metrics:[],target:"3×15",notes:{m:"Chest (inner/lower), Front Delts",e:"Cable Machine + Handles",h:"1) Set pulleys high, a handle in each hand. 2) Step forward with a slight forward lean. 3) Bring the handles down and together in an arc. 4) Squeeze, then return slowly.",t:"Keep a slight bend in the elbows throughout. Cross your hands slightly at the bottom for extra contraction. Move from the chest, not the arms."}},
{name:"Push-ups",cat:"Chest",type:"reps",metrics:[],target:"3×max",notes:{m:"Chest, Front Delts, Triceps, Core",e:"Bodyweight",h:"1) Hands slightly wider than shoulders, body in a straight line. 2) Brace your core and glutes. 3) Lower until your chest nearly touches the floor. 4) Press back up.",t:"Keep your body rigid—no sagging hips. Keep elbows at about 45° from your torso, not flared to 90°. Elevate your hands to scale down or your feet to scale up."}},
{name:"Chest Dips",cat:"Chest",type:"reps",metrics:[],target:"3×max",notes:{m:"Lower Chest, Triceps, Front Delts",e:"Dip Bars",h:"1) Support yourself on parallel bars, arms locked. 2) Lean your torso forward about 30°. 3) Lower until your shoulders are just below your elbows. 4) Press back up.",t:"The forward lean shifts emphasis to the chest (staying upright hits triceps). Don't go so deep that you strain the shoulders. Add a belt for weighted dips."}},
{name:"Seated Cable Row",cat:"Back",type:"weight",metrics:[],target:"3×10",notes:{m:"Mid-Back, Lats, Rhomboids, Biceps",e:"Seated Cable Row Machine",h:"1) Sit with feet on the platform, slight knee bend. 2) Grab the handle and sit tall. 3) Pull to your stomach, driving the elbows back. 4) Squeeze the shoulder blades, return with control.",t:"Keep your torso upright—avoid heaving back and forth. Lead with the elbows and squeeze at the back. Let your lats stretch fully at the front."}},
{name:"Chest-Supported Row (Machine)",cat:"Back",type:"weight",metrics:[],target:"3×10",notes:{m:"Mid-Back, Lats, Rhomboids",e:"Chest-Supported Row Machine",h:"1) Set your chest against the pad. 2) Grip the handles. 3) Row by pulling the elbows back and squeezing the shoulder blades. 4) Lower slowly.",t:"The chest pad removes lower-back strain and momentum. Focus purely on squeezing the upper back. Don't shrug—keep your shoulders down."}},
{name:"Single-Arm Dumbbell Row",cat:"Back",type:"weight",metrics:[],target:"3×10",notes:{m:"Lats, Mid-Back, Biceps",e:"Dumbbell, Bench",h:"1) One knee and hand on the bench, the other foot on the floor. 2) Dumbbell hanging, back flat. 3) Row the DB to your hip, elbow close. 4) Lower to a full stretch.",t:"Pull to the hip, not straight up to the shoulder. Keep your back flat and avoid twisting your torso. Get a full stretch at the bottom each rep."}},
{name:"Inverted Row",cat:"Back",type:"reps",metrics:[],target:"3×max",notes:{m:"Mid-Back, Lats, Biceps, Core",e:"Barbell in Rack or Rings",h:"1) Set a bar or rings at waist height. 2) Hang underneath, body straight, heels on the floor. 3) Pull your chest to the bar. 4) Lower with control.",t:"Keep your body in a rigid plank the whole time. Lower the bar or raise your feet to make it harder. Squeeze the shoulder blades at the top."}},
{name:"Straight-Arm Pulldown",cat:"Back",type:"weight",metrics:[],target:"3×12",notes:{m:"Lats",e:"Cable Machine + Bar",h:"1) Stand facing a high cable, grab the bar. 2) Slight hinge, arms nearly straight. 3) Pull the bar down to your thighs in an arc. 4) Return slowly overhead.",t:"Keep your arms mostly straight—this isolates the lats, not the triceps. Feel the stretch at the top. Great as a lat warm-up or finisher."}},
{name:"Chin-ups",cat:"Back",type:"reps",metrics:[],target:"3×max",notes:{m:"Lats, Biceps, Core",e:"Pull-up Bar",h:"1) Grip the bar underhand, shoulder-width. 2) Hang fully. 3) Pull until your chin clears the bar. 4) Lower with control.",t:"The underhand grip recruits more biceps than pull-ups. Avoid kipping. Use a band or assisted machine if you can't hit the reps."}},
{name:"Rack Pull",cat:"Back",type:"weight",metrics:[],target:"3×5",notes:{m:"Upper Back, Traps, Glutes, Hamstrings",e:"Barbell, Power Rack (pins)",h:"1) Set the bar on pins at knee height. 2) Grip just outside your legs, flat back. 3) Drive the hips forward and stand tall. 4) Lower to the pins with control.",t:"A partial deadlift that lets you overload the upper back and traps. Keep the bar close to your body. Don't hyperextend at the top."}},
{name:"Barbell Shrugs",cat:"Back",type:"weight",metrics:[],target:"3×15",notes:{m:"Traps",e:"Barbell or Dumbbells",h:"1) Hold the bar or dumbbells at arm's length. 2) Shrug your shoulders straight up toward your ears. 3) Pause at the top. 4) Lower slowly.",t:"Move straight up and down—don't roll the shoulders. Pause and squeeze at the top. Use straps if your grip gives out before your traps do."}},
{name:"Assisted Pull-up (Machine)",cat:"Back",type:"reps",metrics:[],target:"3×10",notes:{m:"Lats, Biceps",e:"Assisted Pull-up Machine",h:"1) Set the assistance weight (more weight = more help). 2) Kneel on the pad, grip the bar. 3) Pull up until your chin clears the bar. 4) Lower with control.",t:"A great way to build toward unassisted pull-ups—reduce the assistance over time. Use a full range each rep. Keep your core tight to avoid swinging."}},
{name:"Seated Dumbbell Shoulder Press",cat:"Shoulders",type:"weight",metrics:[],target:"3×10",notes:{m:"Front/Side Delts, Triceps",e:"Dumbbells, Upright Bench",h:"1) Sit with your back supported, dumbbells at shoulder height. 2) Press up until arms nearly lock. 3) Lower to your ears with control.",t:"Don't bang the dumbbells together overhead. Keep your core braced and avoid arching your lower back. Stop just short of lockout to keep tension on the delts."}},
{name:"Arnold Press",cat:"Shoulders",type:"weight",metrics:[],target:"3×10",notes:{m:"Front/Side Delts, Triceps",e:"Dumbbells",h:"1) Start with dumbbells in front, palms facing you. 2) Press up while rotating your palms to face forward. 3) Reverse the rotation on the way down.",t:"The rotation hits more of the front delt through a longer range. Keep it controlled—don't rush the twist. Use lighter weight than a standard press."}},
{name:"Machine Shoulder Press",cat:"Shoulders",type:"weight",metrics:[],target:"3×12",notes:{m:"Delts, Triceps",e:"Shoulder Press Machine",h:"1) Set the seat so handles are at shoulder height. 2) Press up to near lockout. 3) Lower slowly to the start.",t:"Lets you safely push near failure. Keep your back against the pad. Don't let the stack drop—control the negative."}},
{name:"Cable Lateral Raise",cat:"Shoulders",type:"weight",metrics:[],target:"3×15",notes:{m:"Side Delts",e:"Cable Machine + Handle",h:"1) Stand side-on to a low pulley, handle in the far hand. 2) Raise your arm out to the side to shoulder height. 3) Lower slowly.",t:"Cables keep constant tension across the whole range, unlike dumbbells. Lead with the elbow. Keep it light and strict—no swinging."}},
{name:"Reverse Pec Deck (Rear Delt)",cat:"Shoulders",type:"weight",metrics:[],target:"3×15",notes:{m:"Rear Delts",e:"Reverse Pec Deck Machine",h:"1) Face the pad and grab the handles. 2) Open your arms back in an arc, squeezing the rear delts. 3) Return slowly.",t:"Keep a slight elbow bend and lead with the elbows. Don't use your traps—keep shoulders down. High reps work well here."}},
{name:"Bent-Over Rear Delt Fly",cat:"Shoulders",type:"weight",metrics:[],target:"3×15",notes:{m:"Rear Delts, Upper Back",e:"Dumbbells",h:"1) Hinge forward about 45°, dumbbells hanging. 2) Raise your arms out to the sides with a slight elbow bend. 3) Squeeze, then lower slowly.",t:"Use light weight—form matters more than load here. Don't swing or use momentum. Think about pulling the dumbbells apart, not lifting them."}},
{name:"Upright Row",cat:"Shoulders",type:"weight",metrics:[],target:"3×12",notes:{m:"Side Delts, Traps",e:"Barbell or Cable",h:"1) Grip the bar at about shoulder width. 2) Pull straight up, leading with the elbows. 3) Stop at chest height. 4) Lower with control.",t:"Don't pull too high or use too narrow a grip—it can stress the shoulders. A wider grip is shoulder-friendlier. Keep the bar close to your body."}},
{name:"Barbell Curl",cat:"Arms",type:"weight",metrics:[],target:"3×10",notes:{m:"Biceps",e:"Barbell or EZ Bar",h:"1) Stand, grip the bar shoulder-width underhand. 2) Curl up, keeping your elbows pinned. 3) Squeeze at the top. 4) Lower slowly.",t:"Don't swing or use your back—keep the elbows still. Get a full stretch at the bottom each rep. An EZ bar is easier on the wrists."}},
{name:"Dumbbell Bicep Curl",cat:"Arms",type:"weight",metrics:[],target:"3×12",notes:{m:"Biceps",e:"Dumbbells",h:"1) Dumbbells at your sides, palms forward. 2) Curl one or both up. 3) Squeeze, then lower with control.",t:"Keep your elbows at your sides and avoid swinging. Turn the pinky up (supinate) for a stronger contraction. Lower slowly over 2-3 seconds."}},
{name:"Hammer Curl",cat:"Arms",type:"weight",metrics:[],target:"3×12",notes:{m:"Biceps, Brachialis, Forearms",e:"Dumbbells",h:"1) Dumbbells at your sides, palms facing each other (neutral). 2) Curl up keeping the neutral grip. 3) Lower slowly.",t:"Builds arm thickness and forearm strength. Keep your wrists neutral and elbows still. Don't let the dumbbells swing."}},
{name:"Preacher Curl",cat:"Arms",type:"weight",metrics:[],target:"3×10",notes:{m:"Biceps (lower)",e:"Preacher Bench + EZ/Barbell",h:"1) Rest your upper arms on the pad. 2) Curl the bar up. 3) Squeeze, then lower until arms are nearly straight.",t:"The pad eliminates cheating for strict isolation. Don't bounce out of the bottom—control the stretch. Stop just short of full lockout to protect the elbows."}},
{name:"Cable Bicep Curl",cat:"Arms",type:"weight",metrics:[],target:"3×12",notes:{m:"Biceps",e:"Cable Machine + Bar",h:"1) Attach a bar to a low pulley. 2) Curl up with elbows pinned. 3) Squeeze, then lower slowly.",t:"Cables keep constant tension at every point. Keep your elbows fixed at your sides. Great for a high-rep pump finisher."}},
{name:"Overhead Triceps Extension",cat:"Arms",type:"weight",metrics:[],target:"3×12",notes:{m:"Triceps (long head)",e:"Dumbbell or Cable + Rope",h:"1) Hold a dumbbell or rope overhead, elbows up. 2) Lower behind your head by bending the elbows. 3) Extend back overhead.",t:"Keep your elbows pointing forward and close to your head. The overhead position emphasizes the long head. Don't flare the elbows out."}},
{name:"Skull Crushers",cat:"Arms",type:"weight",metrics:[],target:"3×10",notes:{m:"Triceps",e:"EZ Bar, Bench",h:"1) Lie on a bench, bar held over your chest. 2) Bend the elbows to lower the bar toward your forehead. 3) Extend back up.",t:"Keep your upper arms vertical and still—only the forearms move. Lower slightly behind your head for a better stretch. Use an EZ bar to spare the wrists."}},
{name:"Close-Grip Bench Press",cat:"Arms",type:"weight",metrics:[],target:"3×8",notes:{m:"Triceps, Chest",e:"Barbell, Bench, Rack",h:"1) Grip the bar about shoulder width. 2) Lower to your lower chest, elbows tucked. 3) Press up to lockout.",t:"Keep your elbows close to your body to load the triceps. Don't grip so narrow that your wrists hurt. A great triceps mass builder."}},
{name:"Wrist Curls",cat:"Arms",type:"weight",metrics:[],target:"3×15",notes:{m:"Forearms",e:"Dumbbells or Barbell",h:"1) Rest your forearms on your thighs or a bench, palms up. 2) Let the weight roll to your fingers. 3) Curl up by flexing the wrists. 4) Lower slowly.",t:"Use a full range—let the bar roll down the fingers, then curl up. High reps work best for forearms. Flip your palms down for reverse wrist curls."}},
{name:"Front Squat",cat:"Legs",type:"weight",metrics:[],target:"3×6",notes:{m:"Quads, Core, Glutes",e:"Barbell, Rack",h:"1) Rack the bar on your front delts, elbows high. 2) Brace and squat down keeping your torso upright. 3) Hit depth, then drive up through the heels.",t:"Keep those elbows up—if they drop, you'll fall forward. More quad and core demand than a back squat. Use a cross-arm or clean grip, whichever is comfortable."}},
{name:"Leg Press (Machine)",cat:"Legs",type:"weight",metrics:[],target:"3×10",notes:{m:"Quads, Glutes, Hamstrings",e:"Leg Press Machine",h:"1) Sit with feet shoulder-width on the platform. 2) Release the safeties. 3) Lower until your knees reach about 90°. 4) Press back up without locking out hard.",t:"Don't let your lower back round off the pad at the bottom. Keep knees tracking over toes. Higher feet hit glutes/hams; lower feet hit quads."}},
{name:"Leg Extension (Machine)",cat:"Legs",type:"weight",metrics:[],target:"3×12",notes:{m:"Quads",e:"Leg Extension Machine",h:"1) Sit with the pad on your lower shins. 2) Extend your legs to straight. 3) Squeeze the quads at the top. 4) Lower slowly.",t:"Pause and squeeze at the top for the best quad contraction. Don't swing the weight up. Control the negative—don't let it crash down."}},
{name:"Leg Curl (Machine)",cat:"Legs",type:"weight",metrics:[],target:"3×12",notes:{m:"Hamstrings",e:"Leg Curl Machine (lying or seated)",h:"1) Position the pad on your lower calves. 2) Curl your heels toward your glutes. 3) Squeeze, then lower slowly.",t:"Don't let your hips lift off the pad. Squeeze the hamstrings hard at the top. Control the eccentric—hamstrings respond well to slow negatives."}},
{name:"Romanian Deadlift",cat:"Legs",type:"weight",metrics:[],target:"3×8",notes:{m:"Hamstrings, Glutes, Lower Back",e:"Barbell or Dumbbells",h:"1) Hold the bar at your hips, soft knees. 2) Hinge at the hips, pushing them back. 3) Lower the bar along your legs to mid-shin. 4) Drive your hips forward to stand.",t:"Keep the bar close and your back flat throughout. You should feel a deep hamstring stretch—not a squat. Only go as low as your hamstring flexibility allows."}},
{name:"Bulgarian Split Squat",cat:"Legs",type:"weight",metrics:[],target:"3×10",notes:{m:"Quads, Glutes",e:"Dumbbells, Bench",h:"1) Rear foot elevated on a bench, dumbbells in hands. 2) Lower straight down until the front thigh is parallel. 3) Drive up through the front heel.",t:"Keep most of your weight on the front leg. An upright torso hits quads; a forward lean hits glutes. Brutal for balance and single-leg strength."}},
{name:"Goblet Squat",cat:"Legs",type:"weight",metrics:[],target:"3×12",notes:{m:"Quads, Glutes, Core",e:"Kettlebell or Dumbbell",h:"1) Hold a kettlebell or dumbbell at your chest. 2) Squat down between your knees, elbows inside the knees. 3) Drive up through the heels.",t:"A great squat-pattern teacher—it keeps your torso upright. Keep the weight tight to your chest. Go for depth with control."}},
{name:"Hip Thrust",cat:"Legs",type:"weight",metrics:[],target:"3×10",notes:{m:"Glutes, Hamstrings",e:"Barbell, Bench",h:"1) Upper back on a bench, bar over your hips (use a pad). 2) Drive through your heels, lifting your hips to full extension. 3) Squeeze the glutes hard at the top. 4) Lower with control.",t:"Squeeze the glutes and pause at the top. Keep your chin tucked and ribs down—don't hyperextend the lower back. Drive through the heels, not the toes."}},
{name:"Step-ups",cat:"Legs",type:"weight",metrics:[],target:"3×10",notes:{m:"Quads, Glutes",e:"Box/Bench + Dumbbells",h:"1) Dumbbells in hands, face a sturdy box or bench. 2) Step up, driving through the top foot. 3) Stand tall, then lower with control. 4) Alternate legs.",t:"Push through the heel of the top foot—don't push off the bottom foot. Use a height that puts your thigh roughly parallel at the start. Control the way down."}},
{name:"Hack Squat (Machine)",cat:"Legs",type:"weight",metrics:[],target:"3×10",notes:{m:"Quads, Glutes",e:"Hack Squat Machine",h:"1) Shoulders under the pads, feet mid-platform. 2) Release the safeties and squat until knees are about 90°. 3) Drive back up.",t:"A back-friendly way to overload the quads. Keep your whole back against the pad. Higher feet hit glutes/hams; lower feet hit quads."}},
{name:"Hip Abduction (Machine)",cat:"Legs",type:"weight",metrics:[],target:"3×15",notes:{m:"Glutes (medius), Abductors",e:"Hip Abduction Machine",h:"1) Sit with the pads against the outside of your knees. 2) Push your knees outward. 3) Squeeze, then return slowly.",t:"Lean slightly forward to bias the upper glutes. Don't slam the stack back. Great for glute activation and hip health."}},
{name:"Seated Calf Raise (Machine)",cat:"Legs",type:"weight",metrics:[],target:"3×15",notes:{m:"Soleus",e:"Seated Calf Raise Machine",h:"1) Pad across your lower thighs, balls of feet on the platform. 2) Lower your heels for a full stretch. 3) Press up onto your toes. 4) Pause, then lower slowly.",t:"The bent-knee position targets the soleus (vs. standing for the gastroc). Use a full range and pause at the top. Go slow—no bouncing."}},
{name:"Kettlebell Swing",cat:"Legs",type:"weight",metrics:[],target:"3×15",notes:{m:"Glutes, Hamstrings, Core",e:"Kettlebell",h:"1) Hinge and grab the kettlebell, hiking it back between your legs. 2) Snap your hips forward to swing it to chest height. 3) Let it fall, reloading the hinge. 4) Repeat rhythmically.",t:"Power comes from the hips, not the arms—it's a hinge, not a squat or a front raise. Keep your back flat and core braced. Snap the glutes hard at the top."}},
{name:"Box Jumps",cat:"Legs",type:"reps",metrics:[],target:"3×8",notes:{m:"Quads, Glutes (power)",e:"Plyo Box",h:"1) Stand facing a sturdy box. 2) Dip and swing your arms. 3) Explode up and land softly on the box with bent knees. 4) Step down (don't jump down).",t:"Land soft and quiet with knees tracking over toes. Step down to save your Achilles and knees. Pick a height you can land cleanly."}},
{name:"Plank",cat:"Core",type:"time",metrics:[],target:"1 min",notes:{m:"Core, Abs, Shoulders",e:"Bodyweight",h:"1) Forearms on the floor, elbows under shoulders. 2) Body in a straight line from head to heels. 3) Brace your abs and squeeze your glutes. 4) Hold.",t:"Log your hold in minutes (0.5 = 30 seconds). Don't let your hips sag or pike up. Keep breathing steadily and squeeze everything tight."}},
{name:"Side Plank",cat:"Core",type:"time",metrics:[],target:"0.5 min",notes:{m:"Obliques, Core",e:"Bodyweight",h:"1) On one forearm, body sideways in a straight line. 2) Stack or stagger your feet. 3) Lift your hips and brace the obliques. 4) Hold, then switch sides.",t:"Log time per side. Keep your hips high and your body in one line. Reach the top arm to the ceiling for balance."}},
{name:"Cable Crunch",cat:"Core",type:"weight",metrics:[],target:"3×15",notes:{m:"Abs",e:"Cable Machine + Rope",h:"1) Kneel facing a high cable, rope by your head. 2) Crunch down by flexing your spine, bringing elbows toward thighs. 3) Return slowly.",t:"Crunch with your abs—don't just hinge at the hips. Keep your hips still and round the upper back. Squeeze hard at the bottom."}},
{name:"Bicycle Crunch",cat:"Core",type:"reps",metrics:[],target:"3×20",notes:{m:"Abs, Obliques",e:"Bodyweight",h:"1) Lie on your back, hands by your ears, legs up. 2) Bring one elbow toward the opposite knee while extending the other leg. 3) Alternate in a pedaling motion.",t:"Go slow and controlled—it's not a speed race. Rotate from your torso, not just your elbows. Don't yank on your neck."}},
{name:"Wall Toss (Weighted)",cat:"Core",type:"weight",metrics:[],target:"3×10@20",notes:{m:"Core, Obliques (rotational power), Shoulders",e:"Medicine Ball + Wall",h:"1) Stand side-on to a wall, medicine ball at your hip. 2) Rotate your hips and torso explosively to throw the ball at the wall. 3) Catch the rebound and reload. 4) Finish all reps, then switch sides.",t:"Power comes from rotating your hips, not just your arms. Throw hard and catch soft. Log the ball weight (lbs) and reps per side—great for explosive rotational power."}},
{name:"Medicine Ball Slam",cat:"Core",type:"weight",metrics:[],target:"3×10@20",notes:{m:"Core, Lats, Shoulders",e:"Medicine Ball",h:"1) Hold the ball overhead, fully extended. 2) Slam it to the floor using your abs and lats. 3) Pick it up and repeat.",t:"Use a non-bouncy slam ball. Drive the slam with your core, not just your arms. Exhale hard on each slam—great conditioning and power work."}},
{name:"Cable Wood Chop",cat:"Core",type:"weight",metrics:[],target:"3×12",notes:{m:"Obliques, Core",e:"Cable Machine",h:"1) Set the pulley high, grab the handle with both hands. 2) Pull diagonally across your body down to the opposite hip. 3) Rotate through the torso. 4) Return slowly, then switch sides.",t:"Rotate from your core, pivoting the back foot. Keep your arms fairly straight. Control the return—don't let the cable yank you back."}},
{name:"Hyperextension (Back Extension)",cat:"Core",type:"reps",metrics:[],target:"3×15",notes:{m:"Lower Back, Glutes, Hamstrings",e:"Hyperextension Bench",h:"1) Hips on the pad, ankles secured. 2) Hinge down at the hips. 3) Raise your torso until it's in line with your legs. 4) Squeeze the glutes; don't overarch.",t:"Stop at a straight line—don't hyperextend past neutral. Hold a plate to your chest to add resistance. Squeeze the glutes at the top."}},
{name:"Pallof Press",cat:"Core",type:"weight",metrics:[],target:"3×12",notes:{m:"Core (anti-rotation)",e:"Cable or Band",h:"1) Stand side-on to a cable at chest height, both hands on the handle at your chest. 2) Press the handle straight out. 3) Resist the pull trying to rotate you. 4) Return, then switch sides.",t:"The goal is to NOT rotate—brace hard and stay square. Move slowly and with control. A staple for core stability and a healthy spine."}},
{name:"Decline Sit-up",cat:"Core",type:"reps",metrics:[],target:"3×15",notes:{m:"Abs, Hip Flexors",e:"Decline Bench",h:"1) Hook your legs on a decline bench. 2) Lower your torso back. 3) Curl up by flexing the abs. 4) Lower with control.",t:"Don't yank with your neck or arms—lead with the abs. Control the way down. Hold a plate to your chest to add load."}},
{name:"Rowing Machine",cat:"Cardio",type:"time",metrics:["distance", "speed"],target:"15 min",notes:{m:"Back, Legs, Core, Cardiovascular",e:"Rowing Erg",h:"1) Strap in and grab the handle. 2) Drive with the legs first, then lean back, then pull to the ribs. 3) Reverse the order: arms, hips, then knees. 4) Repeat smoothly.",t:"It's legs-first—roughly 60% legs, 20% core, 20% arms. Don't yank with the arms early. Log time, distance, and pace/speed."}},
{name:"Stair Climber",cat:"Cardio",type:"time",metrics:[],target:"15 min",notes:{m:"Glutes, Quads, Calves, Cardiovascular",e:"Stair Climber Machine",h:"1) Step on and set a steady pace. 2) Stand tall and take full steps. 3) Avoid leaning heavily on the rails.",t:"Don't slump or hold the rails for support—it cuts the work. Take full, deep steps. Log your total time."}},
{name:"Elliptical",cat:"Cardio",type:"time",metrics:["distance", "speed"],target:"20 min",notes:{m:"Legs, Glutes, Cardiovascular",e:"Elliptical Machine",h:"1) Step on and grab the moving handles. 2) Drive a smooth stride, pushing through the pedals. 3) Maintain a steady cadence.",t:"Low-impact and easy on the joints. Push and pull the handles to involve the upper body. Log time, distance, and speed."}},
{name:"Jump Rope",cat:"Cardio",type:"time",metrics:[],target:"10 min",notes:{m:"Calves, Shoulders, Cardiovascular",e:"Jump Rope",h:"1) Hold the handles, rope behind you. 2) Turn the rope with your wrists. 3) Hop just enough to clear the rope. 4) Stay light on the balls of your feet.",t:"Small hops—don't jump high. Turn with the wrists, not big arm swings. Great warm-up or conditioning finisher; log total time."}},
{name:"Assault Bike",cat:"Cardio",type:"time",metrics:["distance", "speed"],target:"10 min",notes:{m:"Full Body, Cardiovascular",e:"Air/Assault Bike",h:"1) Grab the moving handles, feet on the pedals. 2) Push and pull the arms while driving the legs. 3) Hold a pace or do intervals.",t:"Brutal for conditioning—the harder you push, the more resistance. Great for intervals (e.g., 20s hard / 40s easy). Log time, distance, and speed."}},
{name:"Sled Push",cat:"Cardio",type:"time",metrics:["distance", "weight"],target:"5 min",notes:{m:"Quads, Glutes, Calves, Core",e:"Sled + Plates",h:"1) Load the sled and grip the posts low or high. 2) Lean in and drive with the legs in powerful steps. 3) Push for distance or time.",t:"Keep your arms locked and drive through the legs. A low grip means more leg drive. Log the load (lbs) and distance—excellent low-impact conditioning."}},
{name:"Battle Ropes",cat:"Cardio",type:"time",metrics:[],target:"5 min",notes:{m:"Shoulders, Arms, Core, Cardiovascular",e:"Battle Ropes",h:"1) Hold an end in each hand in an athletic stance. 2) Whip the ropes—alternating or together. 3) Keep a steady rhythm in short bursts.",t:"Keep your core braced and knees soft. Great for intervals (e.g., 30s on / 30s off). Log total work time."}}

// Parse target into set objects
function targetToSets(target){
  const sets=pSets(target),reps=pR(target),wt=pW(target);
  const arr=[];for(let i=0;i<(sets||1);i++)arr.push({wt:wt,reps:reps||0});
  return arr;
}
function parseMin(t){var m=String(t).match(/(\d+(?:\.\d+)?)\s*min/);return m?+m[1]:0}
function defaultSets(name,target){
  if(exType(name)==='time')return[{dur:parseMin(target),dist:0,speed:0,wt:0}];
  return targetToSets(target);
}
function fmtSetLine(name,sets){
  if(!sets||!sets.length)return'';
  var t=exType(name);
  if(t==='time'){
    return sets.map(function(s,i){var parts=[];if(s.dur)parts.push(s.dur+'min');if(s.dist)parts.push(s.dist+'mi');if(s.speed)parts.push(s.speed+'mph');if(s.wt)parts.push(s.wt+'lbs');return(sets.length>1?('#'+(i+1)+': '):'')+(parts.join(' · ')||'—')}).join('<br>');
  }
  if(t==='reps'){
    return sets.map(function(s,i){return'S'+(i+1)+': '+(s.reps||0)+(s.wt?' @'+s.wt:'')}).join(' · ');
  }
  return sets.map(function(s,i){return'S'+(i+1)+': '+(s.wt?s.wt+'×':'')+(s.reps||0)}).join(' · ');
}

// Get exercise history with volume — aggregates PROGRAM days + TEMPLATE sessions by name.
function getHist(exName){
  const pts=[];const launch=S.get('launchDate',td());const t=exType(exName);
  // Program logs (strength only)
  for(let w=1;w<=28;w++){
    for(const d of['A','B','C']){
      if(!DAYS[d].ex.includes(exName))continue;
      const data=wG(w,d),rec=data[exName];if(!rec||!rec.done)continue;
      if(!rec.sets||!rec.sets.length)continue; // only chart actually-logged sets
      let maxWt=0,maxReps=0,vol=0;
      rec.sets.forEach(s=>{if(s.wt>maxWt)maxWt=s.wt;if(s.reps>maxReps)maxReps=s.reps;vol+=((s.wt||1)*s.reps)});
      const dt=rec.date||addDays(launch,(w-1)*7);
      pts.push({week:w,day:d,weight:maxWt,reps:maxReps,vol:vol,dur:0,dist:0,speed:0,date:dt,sortKey:dt,label:`W${w}`,src:'P'});
    }
  }
  // Template sessions (any type)
  getTSessions().forEach(function(sess){
    const rec=sess.log&&sess.log[exName];if(!rec||!rec.done)return;
    if(!rec.sets||!rec.sets.length)return; // only chart actually-logged sets
    let maxWt=0,maxReps=0,vol=0,dur=0,dist=0,speed=0;
    if(rec.sets&&rec.sets.length){rec.sets.forEach(function(s){if(s.wt>maxWt)maxWt=s.wt;if(s.reps>maxReps)maxReps=s.reps;vol+=((s.wt||1)*(s.reps||0));dur+=(s.dur||0);dist+=(s.dist||0);if((s.speed||0)>speed)speed=s.speed});}
    if(t==='time')vol=dur;
    pts.push({week:0,day:'',weight:maxWt,reps:maxReps,vol:vol,dur:dur,dist:dist,speed:speed,date:sess.date,sortKey:sess.date,label:mdLabel(sess.date),src:'T'});
  });
  pts.sort(function(a,b){return a.sortKey<b.sortKey?-1:a.sortKey>b.sortKey?1:0});
  return pts;
}
function addDays(dateStr,n){var d=new Date(dateStr+"T00:00:00");d.setDate(d.getDate()+n);return dstr(d)}
function mdLabel(dateStr){var d=new Date(dateStr);return(d.getMonth()+1)+'/'+d.getDate()}

function drawBar(id,labels,vals,color,mx){
  setTimeout(()=>{const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d');const W=c.parentElement.clientWidth;c.width=W*2;c.height=400;ctx.scale(2,2);const w=W,h=200,pad=35,bp=30;ctx.clearRect(0,0,w,h);const M=mx||Math.max(...vals,1);const bw=Math.max(4,Math.min(28,(w-pad*2)/labels.length-2));ctx.fillStyle='#333';ctx.fillRect(pad,0,1,h-bp);ctx.fillRect(pad,h-bp,w-pad,1);ctx.font='10px -apple-system,sans-serif';ctx.fillStyle='#9E9E9E';for(let i=0;i<=4;i++){const y=(h-bp)*(1-i/4);ctx.fillText(Math.round(M*i/4),2,y+4)}const step=(w-pad*2)/labels.length;vals.forEach((v,i)=>{const bh=Math.max(1,(v/M)*(h-bp-10));const x=pad+step*i+(step-bw)/2;ctx.fillStyle=color;ctx.beginPath();ctx.roundRect(x,h-bp-bh,bw,bh,2);ctx.fill();if(v>0){ctx.save();ctx.fillStyle='#fff';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(v,x+bw/2,h-bp-bh-4);ctx.restore()}if(labels.length<=14){ctx.save();ctx.fillStyle='#9E9E9E';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(labels[i],x+bw/2,h-bp+12);ctx.restore()}})},50)}

function drawLine(id,pts,yKey,color,unit){
  setTimeout(()=>{const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d');const W=c.parentElement.clientWidth;c.width=W*2;c.height=400;ctx.scale(2,2);const w=W,h=200,pad=40,bp=30;ctx.clearRect(0,0,w,h);
  if(!pts.length){ctx.fillStyle='#9E9E9E';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('Complete workouts to see data',w/2,h/2);return}
  const vals=pts.map(p=>p[yKey]);const mx=Math.max(...vals)*1.15||1;const mn=Math.min(...vals)*0.85||0;const rng=mx-mn||1;
  ctx.fillStyle='#333';ctx.fillRect(pad,0,1,h-bp);ctx.fillRect(pad,h-bp,w-pad,1);
  ctx.font='10px sans-serif';ctx.fillStyle='#9E9E9E';for(let i=0;i<=4;i++){const y=(h-bp)*(1-i/4);ctx.fillText(Math.round(mn+rng*i/4)+(unit||''),1,y+4)}
  const step=(w-pad*2)/Math.max(pts.length-1,1);ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
  pts.forEach((p,i)=>{const x=pad+step*i;const y=(h-bp)*(1-(p[yKey]-mn)/rng);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
  ctx.fillStyle=color;pts.forEach((p,i)=>{const x=pad+step*i;const y=(h-bp)*(1-(p[yKey]-mn)/rng);ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.save();ctx.fillStyle='#fff';ctx.font='bold 9px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(Math.round(p[yKey]),x,y-8);ctx.restore()});
  if(pts.length<=20){ctx.fillStyle='#9E9E9E';ctx.font='9px sans-serif';ctx.textAlign='center';pts.forEach((p,i)=>{ctx.fillText(p.label,pad+step*i,h-bp+12)})}},50)}

function startTemplateWorkout(id){

function togTEx(ex){

  var sc=(rec.sets&&rec.sets.length)?rec.sets.length:(pSets(libTarget(ex))||1);
  if(rec.done){rec.setsDone=[];for(var k=0;k<sc;k++)rec.setsDone[k]=true;if(rec.sets&&rec.sets.length)checkForPR(ex,rec)}else{rec.setsDone=[]}

  var sessions=getTSessions();sessions.push(sess);saveTSessions(sessions);

}

// ═══════════ PROGRESS ═══════════
function rProg(el){
  var names=exNames();if(!names.length)names=['Bench Press'];
  var selEx=S.get('pEx','Bench Press');if(names.indexOf(selEx)<0)selEx=names[0];
  var type=exType(selEx);const isW=type==='weight';const hist=getHist(selEx);
  let benchB=160,puB=9;
  for(let w=1;w<=28;w++){for(const d of['A','B','C']){const data=wG(w,d);
    if(data['Bench Press']?.done){let mx=0;if(data['Bench Press'].sets)data['Bench Press'].sets.forEach(s=>{if(s.wt>mx)mx=s.wt});else mx=pW(data['Bench Press'].actual||getT('Bench Press',d,w));if(mx>benchB)benchB=mx}
    if(data['Pull-ups']?.done){let mx=0;if(data['Pull-ups'].sets)data['Pull-ups'].sets.forEach(s=>{if(s.reps>mx)mx=s.reps});else mx=pR(data['Pull-ups'].actual||getT('Pull-ups',d,w));if(mx>puB)puB=mx}
  }}
  getTSessions().forEach(function(sess){
    var b=sess.log&&sess.log['Bench Press'];if(b&&b.done&&b.sets){b.sets.forEach(function(s){if(s.wt>benchB)benchB=s.wt})}
    var p=sess.log&&sess.log['Pull-ups'];if(p&&p.done&&p.sets){p.sets.forEach(function(s){if(s.reps>puB)puB=s.reps})}
  });
  const bP=Math.min(100,Math.round(benchB/225*100)),pP=Math.min(100,Math.round(puB/15*100));
  // Decide chart keys/labels by type
  var exKey,exUnit,exColor,exTitle,volKey,volUnit,volColor,volTitle,metricSel='';
  if(type==='time'){
    var keyLabel={dur:'Duration (min)',dist:'Distance (mi)',speed:'Speed (mph)',wt:'Weight (lbs)'};

function archiveHabit(i){var habits=S.get('habits',[]);if(habits[i]){habits[i].archived=true;S.set('habits',habits);render()}}
function unarchiveHabit(i){var habits=S.get('habits',[]);if(habits[i]){habits[i].archived=false;S.set('habits',habits);render()}}

function getHabitPeriodKey(hab,date){
  var d=new Date(date+"T00:00:00");
  if(hab.cadence==='daily')return date;
  if(hab.cadence==='weekly'){
    var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);
    var mon=new Date(d);mon.setDate(diff);return dstr(mon);
  }
  if(hab.cadence==='monthly')return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
  if(hab.cadence==='quarterly'){var q=Math.floor(d.getMonth()/3)+1;return d.getFullYear()+'-Q'+q}
  return date;
}
function isHabitDone(hab){

function getHabitCompliance(hab){
  var log=S.get('hab_'+hab.id,{});
  var created=hab.created||S.get('launchDate',td());
  var periods=getPeriodsFromDate(hab.cadence,created);
  if(!periods.length)return 0;
  var done=0;periods.forEach(function(p){if(log[p])done++});
  return Math.round(done/periods.length*100);
}
function getPeriodsFromDate(cadence,startDate){
  var periods=[];var now=effNow();var d=new Date(startDate+"T00:00:00");
  if(cadence==='daily'){
    while(d<=now){periods.push(dstr(d));d.setDate(d.getDate()+1)}
  } else if(cadence==='weekly'){
    var day=d.getDay();var diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);
    while(d<=now){periods.push(dstr(d));d.setDate(d.getDate()+7)}
  } else if(cadence==='monthly'){
    d.setDate(1);
    while(d<=now){periods.push(d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1));d.setMonth(d.getMonth()+1)}
  } else if(cadence==='quarterly'){
    d.setDate(1);d.setMonth(Math.floor(d.getMonth()/3)*3);
    while(d<=now){var q=Math.floor(d.getMonth()/3)+1;periods.push(d.getFullYear()+'-Q'+q);d.setMonth(d.getMonth()+3)}
  }
  return periods;
}
function getHabitChartData(hab){
  var log=S.get('hab_'+hab.id,{});
  var created=hab.created||S.get('launchDate',td());
  var labels=[],values=[];
  if(hab.cadence==='daily'){
    var start=new Date(created+"T00:00:00");var now=effNow();
    var weekNum=0;
    while(start<=now){
      var weekDone=0,weekTotal=0;
      for(var wd=0;wd<7&&start<=now;wd++){
        var ds=dstr(start);weekTotal++;if(log[ds])weekDone++;
        start.setDate(start.getDate()+1);
      }
      weekNum++;if(weekTotal>0){labels.push('Wk'+weekNum);values.push(Math.round(weekDone/weekTotal*100))}
    }
  } else {
    var periods=getPeriodsFromDate(hab.cadence,created);
    periods.forEach(function(p,pi){
      var label=hab.cadence==='weekly'?'Wk'+(pi+1):hab.cadence==='monthly'?p.slice(2):p;
      labels.push(label);values.push(log[p]?100:0);
    });
  }
  return{labels:labels,values:values};
}

function taskStatus(t){
  if(t.done&&(!t.recur||t.recur==='none'))return 'done';
  if(!t.due)return 'anytime';
  var today=td();
  if(t.due<today)return 'overdue';

function addTaskInterval(dateStr,recur){

  else if(recur==='monthly')d.setMonth(d.getMonth()+1);
  else if(recur==='quarterly')d.setMonth(d.getMonth()+3);
  else if(recur==='annually')d.setFullYear(d.getFullYear()+1);
  return dstr(d);
}

// ============ PR DETECTION & CONFETTI ============
function getAllPRs(){
  var prs={};
  exNames().forEach(function(ex){
    var hist=getHist(ex);var bestWt=0,bestReps=0,bestVol=0;
    hist.forEach(function(h){if(h.weight>bestWt)bestWt=h.weight;if(h.reps>bestReps)bestReps=h.reps;if(h.vol>bestVol)bestVol=h.vol});
    if(hist.length)prs[ex]={weight:bestWt,reps:bestReps,vol:bestVol,sessions:hist.length};
  });
  return prs;
}
function checkForPR(ex,rec){
  if(!rec.sets||!rec.sets.length)return;
  var t=exType(ex);var best=0;
  if(t==='time'){rec.sets.forEach(function(s){var v=(s.dist||0)||(s.dur||0);if(v>best)best=v})}
  else if(t==='reps'){rec.sets.forEach(function(s){if((s.reps||0)>best)best=s.reps})}
  else{rec.sets.forEach(function(s){if((s.wt||0)>best)best=s.wt})}
  var oldPrs=S.get('prs',{});var prev=oldPrs[ex]||0;
  if(best>prev){oldPrs[ex]=best;S.set('prs',oldPrs);fireConfetti()}
}
function fireConfetti(){
  var canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300';
  document.body.appendChild(canvas);
  var ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  var particles=[];var colors=['#4FC3F7','#66BB6A','#FFD54F','#EF5350','#AB47BC','#fff'];
  for(var i=0;i<120;i++)particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-0.5)*12,vy:Math.random()*-14-4,size:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,life:1});
  var frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);var alive=false;
    particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.rot+=3;p.life-=0.012;if(p.life<=0)return;alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()});
    if(alive&&frame<180){frame++;requestAnimationFrame(animate)}else{document.body.removeChild(canvas)}
  }
  requestAnimationFrame(animate);
}

function getWeekRecap(){
  var workouts=0,totalVol=0,waterTotal=0,waterDays=0,stretchDays=0;
  var stretches=getStretches();
  for(var i=0;i<7;i++){
    var d2=effNow();d2.setDate(d2.getDate()-i);var ds=dstr(d2);
    var w=S.get('hyd_'+ds,0);if(w>0){waterTotal+=w;waterDays++}
    var sc=S.get('str_'+ds,[]);if(stretches.length&&stretches.every(function(_,j){return sc[j]}))stretchDays++;
  }
  for(var w2=1;w2<=28;w2++){
    ['A','B','C'].forEach(function(d){
      var wd=wG(w2,d);var allDone=DAYS[d].ex.every(function(ex){return wd[ex]&&wd[ex].done});
      if(allDone&&wd[DAYS[d].ex[0]]&&wd[DAYS[d].ex[0]].date){
        var dt=wd[DAYS[d].ex[0]].date;
        if(dBet(dt,td())<=7&&dBet(dt,td())>=0){
          workouts++;
          DAYS[d].ex.forEach(function(ex){if(wd[ex]&&wd[ex].sets)wd[ex].sets.forEach(function(s){totalVol+=(s.wt||1)*s.reps})});
        }
      }
    });
  }
  return{workouts:workouts,vol:totalVol,avgWater:waterDays?Math.round(waterTotal/waterDays):0,stretchDays:stretchDays};
}

// ============ BODY WEIGHT ============
function saveBW(){var v=document.getElementById('bwInput').value;if(v&&!isNaN(+v)){S.set('bw_'+td(),+v);render()}}

// ============ EXPORT / IMPORT ============
function exportData(){
  var data={};Object.keys(localStorage).filter(function(k){return k.startsWith('bt_')}).forEach(function(k){data[k]=localStorage.getItem(k)});
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='sustainability_backup_'+td()+'.json';a.click();URL.revokeObjectURL(url);
  S.set('lastExport',td());if(navigator.storage&&navigator.storage.persist){navigator.storage.persist().then(function(g){if(g)console.log('Persistent storage granted')})}
  render();
}
function emailBackup(){
  var data={};Object.keys(localStorage).filter(function(k){return k.startsWith('bt_')}).forEach(function(k){data[k]=localStorage.getItem(k)});
  var json=JSON.stringify(data);
  var subject='Sustainability Backup - '+td();
  var body='Training app backup from '+td()+'%0A%0APaste into a .json file to restore:%0A%0A'+encodeURIComponent(json);
  if(body.length>1800000){body='Backup too large for email. Use Export button instead.'}
  window.location.href='mailto:brock.wiegand@rheoengineering.com?subject='+encodeURIComponent(subject)+'&body='+body;
  S.set('lastExport',td());
}
function backupNeeded(){var last=S.get('lastExport',null);if(!last)return true;return dBet(last,td())>=7}
function importData(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();reader.onload=function(e){
    try{var data=JSON.parse(e.target.result);var count=0;Object.keys(data).forEach(function(k){localStorage.setItem(k,data[k]);count++});
    alert('Imported '+count+' items. Reloading...');location.reload()}catch(err){alert('Invalid backup file')}};
  reader.readAsText(file);
}

// ============ SETTINGS ============
function openSet(){
  var mc=document.getElementById('emc');
  var h='<h2 style="color:#fff">Settings</h2>';
  h+='<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div class="flex between"><span>Current Week</span><div class="flex gap4">';
  h+='<button class="btn btn-sm btn-outline" onclick="cWeek=Math.max(1,cWeek-1);S.set(\'cWeek\',cWeek);openSet()">-</button>';
  h+='<span style="min-width:40px;text-align:center">'+cWeek+'</span>';
  h+='<button class="btn btn-sm btn-outline" onclick="cWeek=Math.min(28,cWeek+1);S.set(\'cWeek\',cWeek);openSet()">+</button>';
  h+='</div></div></div>';
  h+='<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div class="flex between"><span>Launch Date</span><span style="color:var(--accent)">'+S.get('launchDate',td())+'</span></div></div>';
  h+='<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div class="flex between"><span>Export Data</span><button class="btn btn-sm btn-primary" onclick="exportData()">Export</button></div></div>';
  h+='<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div class="flex between"><span>Email Backup</span><button class="btn btn-sm btn-primary" onclick="emailBackup()">Email</button></div></div>';
  h+='<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div class="flex between"><span>Import Data</span><button class="btn btn-sm btn-outline" onclick="document.getElementById(\'impFile\').click()">Import</button><input type="file" id="impFile" accept=".json" style="display:none" onchange="importData(this)"></div></div>';
  h+='<div style="padding:12px 0"><div class="flex between"><span>Reset All Data</span>';
  h+='<button class="btn btn-sm btn-outline" style="color:var(--red)" onclick="if(confirm(\'Delete ALL data?\')){Object.keys(localStorage).filter(function(k){return k.startsWith(\'bt_\')}).forEach(function(k){localStorage.removeItem(k)});location.reload()}">Reset</button>';
  h+='</div></div>';
  h+='<button class="btn btn-outline" onclick="closeM();render()" style="width:100%;margin-top:16px">Close</button>';
  mc.innerHTML=h;document.getElementById('editModal').classList.add('show');
}

document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this){if(EDIT){seSync();EDIT=null;render()}closeM()}});
render();
